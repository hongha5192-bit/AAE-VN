# Minimal smoke-test config for local macOS/CPU validation.
# Keeps the training loop tiny so we can verify the end-to-end path.

model:
  name: Qwen/Qwen3-0.6B
  flash_attn: false
  attn_implementation: eager
  dtype: float32
  device_map: null

lora:
  r: 8
  alpha: 16
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj

training:
  num_generations: 2
  max_new_tokens: 64
  max_tool_calling_iterations: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 1
  num_train_epochs: 1
  max_steps: 1
  learning_rate: 1.0e-6
  bf16: false
  logging_steps: 1
  save_steps: 1
  save_total_limit: 1
  report_to: none
  beta: 0.001
  seed: 42

data:
  train_path: data/train.parquet
  val_path: data/val.parquet

backtest:
  url: http://localhost:8002
  default_period: train
  periods:
    train:
      start: "2016-01-01"
      end: "2023-12-31"
    val:
      start: "2024-01-01"
      end: "2024-12-31"
    test:
      start: "2025-01-01"
      end: "2026-12-31"
